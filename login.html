<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 5 Minutes</title>
    <style>
        /* Menggunakan font serif untuk heading agar mirip gambar */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f6f0ee; /* Warna background luar yang lembut */
            font-family: 'Inter', sans-serif;
        }

        .main-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background-color: #ffffff;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* BAGIAN KIRI - GAMBAR */
        .left-side {
            width: 40%;
            background: url('https://picsum.photos/id/10/800/1200') no-repeat center;
            background-size: cover;
            margin: 15px;
            border-radius: 15px;
        }

        /* BAGIAN KANAN - FORM */
        .right-side {
            width: 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-placeholder {
            width: 150px;
            margin-bottom: 20px;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 20px;
            color: #000;
        }

        .terms-text {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #000;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #000;
            font-size: 16px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #000;
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #333;
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 15px;
            font-size: 14px;
            color: #000;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .left-side {
                display: none;
            }
            .right-side {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-side"></div>

        <div class="right-side">
            
            <div class="logo-section">
                <img src="5menit.png" alt="Logo" class="logo-placeholder">
            </div>

            <div class="form-container">
                <h2>Masuk atau buat akun</h2>
                
                <p class="terms-text">
                    Dengan melanjutkan, termasuk melalui mitra platform kami, Anda menyetujui Perjanjian Pengguna kami (termasuk pengabaian gugatan kelompok dan ketentuan arbitrase) dan mengakui Kebijakan Privasi kami.
                </p>

                <form>
                    <div class="input-group">
                        <label for="password">Kata Sandi</label>
                        <input type="password" id="password" required>
                    </div>

                    <button type="submit" class="btn-submit">MASUK</button>
                    
                    <a href="#" class="forgot-password">Lupa kata Sandi?</a>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
