<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with Apple - Connected Apps</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Modal Container */
        .apple-modal {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .modal-header {
            padding: 40px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #1d1d1f;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .close-button:hover {
            background-color: #f0f0f0;
        }

        /* Apple Logo Container */
        .apple-logo-container {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .apple-logo {
            width: 32px;
            height: 32px;
            fill: white;
        }

        /* Title & Subtitle */
        .modal-title {
            font-size: 21px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .modal-subtitle {
            font-size: 15px;
            color: #86868b;
            margin-bottom: 12px;
        }

        .privacy-link {
            font-size: 14px;
            color: #007AFF;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .privacy-link:hover {
            color: #0051D5;
            text-decoration: underline;
        }

        /* Apps List */
        .apps-list {
            padding: 20px 0;
            max-height: 50vh;
            overflow-y: auto;
        }

        .app-item {
            display: flex;
            align-items: center;
            padding: 16px 30px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .app-item:hover {
            background-color: #f8f8f8;
        }

        .app-item:last-child {
            border-bottom: none;
        }

        .app-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #1d1d1f 0%, #434344 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .app-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .app-name {
            flex: 1;
            font-size: 16px;
            color: #1d1d1f;
            font-weight: 400;
        }

        .app-arrow {
            color: #c7c7cc;
            font-size: 18px;
            font-weight: 300;
        }

        /* Scrollbar Styling */
        .apps-list::-webkit-scrollbar {
            width: 8px;
        }

        .apps-list::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 4px;
        }

        .apps-list::-webkit-scrollbar-thumb {
            background: #c7c7cc;
            border-radius: 4px;
        }

        .apps-list::-webkit-scrollbar-thumb:hover {
            background: #86868b;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .modal-header {
                padding: 30px 20px 20px;
            }

            .app-item {
                padding: 14px 20px;
            }

            .apple-logo-container {
                width: 48px;
                height: 48px;
            }

            .apple-logo {
                width: 28px;
                height: 28px;
            }

            .modal-title {
                font-size: 19px;
            }
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: rgba(0, 0, 0, 0.7);
            }

            .apple-modal {
                background: #1c1c1e;
            }

            .modal-header {
                border-bottom-color: #38383a;
            }

            .modal-title {
                color: #f5f5f7;
            }

            .modal-subtitle {
                color: #98989d;
            }

            .close-button {
                color: #f5f5f7;
            }

            .close-button:hover {
                background-color: #38383a;
            }

            .app-item {
                border-bottom-color: #38383a;
            }

            .app-item:hover {
                background-color: #2c2c2e;
            }

            .app-name {
                color: #f5f5f7;
            }

            .apps-list::-webkit-scrollbar-track {
                background: #2c2c2e;
            }
        }
    </style>
</head>
<body>

    <div class="apple-modal">
        <button class="close-button" onclick="closeModal()">&times;</button>
        
        <div class="modal-header">
            <div class="apple-logo-container">
                <svg class="apple-logo" viewBox="0 0 17 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15.5 14.5c-.5 1-1 1.5-1.5 2-1 1-2 1.5-3.5 1.5-1.5 0-2.5-.5-3.5-1.5-.5-.5-1-1-1.5-2-.5-1-1-2.5-1-4 0-1.5.5-2.5 1-3.5.5-1 1-1.5 1.5-2C6.5 4 7.5 3.5 9 3.5c1.5 0 2.5.5 3.5 1.5.5.5 1 1 1.5 2 .5 1 1 2.5 1 4 0 1.5-.5 2.5-1 3.5zm-2.5-9c-.5-.5-1-1-1.5-1.5-.5-.5-1-1-1.5-1.5-.5-.5-1-1-1.5-1.5-.5-.5-1-1-1.5-1.5-.5-.5-1-1-1.5-1.5-.5-.5-1-1-1.5-1.5z"/>

                    </svg>
                </div>
                <span class="app-name">Adobe</span>
                <span class="app-arrow">›</span>
            </div>

            <div class="app-item">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14.5c-.5 1-1 1.5-1.5 2-1 1-2 1.5-3.5 1.5-1.5 0-2.5-.5-3.5-1.5-.5-.5-1-1-1.5-2-.5-1-1-2.5-1-4 0-1.5.5-2.5 1-3.5.5-1 1-1.5 1.5-2C6.5 4 7.5 3.5 9 3.5c1.5 0 2.5.5 3.5 1.5.5.5 1 1 1.5 2 .5 1 1 2.5 1 4 0 1.5-.5 2.5-1 3.5z"/>
                    </svg>
                </div>
                <span class="app-name">Adobe XD</span>

            </div>

            <div class="app-item">
                <div class="app-icon">

                        <path d="M15.5 14.5c-.5 1-1 1.5-1.5 2-1 1-2 1.5-3.5 1.5-1.5 0-2.5-.5-3.5-1.5-.5-.5-1-1-1.5-2-.5-1-1-2.5-1-4 0-1.5.5-2.5 1-3.5.5-1 1-1.5 1.5-2C6.5 4 7.5 3.5 9 3.5c1.5 0 2.5.5 3.5 1.5.5.5 1 1 1.5 2 .5 1 1 2.5 1 4 0 1.5-.5 2.5-1 3.5z"/>
                    </svg>
                </div>
                <span class="app-name">Bluebird Production App</span>
                <span class="app-arrow">›</span>
            </div>

            <div class="app-item">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14.5c-.5 1-1 1.5-1.5 2-1 1-2 1.5-3.5 1.5-1.5 0-2.5-.5-3.5-1.5-.5-.5-1-1-1.5-2-.5-1-1-2.5-1-4 0-1.5.5-2.5 1-3.5.5-1 1-1.5 1.5-2C6.5 4 7.5 3.5 9 3.5c1.5 0 2.5.5 3.5 1.5.5.5 1 1 1.5 2 .5 1 1 2.5 1 4 0 1.5-.5 2.5-1 3.5z"/>
                    </svg>
                </div>
                <span class="app-name">Canva</span>
                <span class="app-arrow">›</span>
            </div>

            <div class="app-item">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14.5c-.5 1-1 1.5-1.5 2-1 1-2 1.5-3.5 1.5-1.5 0-2.5-.5-3.5-1.5-.5-.5-1-1-1.5-2-.5-1-1-2.5-1-4 0-1.5.5-2.5 1-3.5.5-1 1-1.5 1.5-2C6.5 4 7.5 3.5 9 3.5c1.5 0 2.5.5 3.5 1.5.5.5 1 1 1.5 2 .5 1 1 2.5 1 4 0 1.5-.5 2.5-1 3.5z"/>
                    </svg>
                </div>
                <span class="app-name">Capshot iOS Official App ID</span>
                <span class="app-arrow">›</span>
            </div>
        </div>
    </div>

    <script>
        function closeModal() {
            // Tambahkan logika untuk menutup modal
            document.querySelector('.apple-modal').style.animation = 'modalSlideOut 0.3s ease-out forwards';
            setTimeout(() => {
                document.querySelector('.apple-modal').style.display = 'none';
            }, 300);
        }

        // Tambahkan animasi slide out
        const style = document.createElement('style');
        style.textContent = `
            @keyframes modalSlideOut {
                from {
                    opacity: 1;
                    transform: translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);

        // Handle app item click
        document.querySelectorAll('.app-item').forEach(item => {
            item.addEventListener('click', function() {
                const appName = this.querySelector('.app-name').textContent;
                console.log('Clicked app:', appName);
                // Tambahkan logika untuk mengelola aplikasi
            });
        });
    </script>

</body>
</html>
